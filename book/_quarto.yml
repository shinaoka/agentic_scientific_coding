book:
  title: "Agentic Scientific Coding"
  author: "Hiroshi Shinaoka"
  navbar:
    search: true
  chapters:
    - index.qmd
    - part: "Section 1: Safe Workflow Before Coding"
      chapters:
        - getting-started/download-the-material.qmd
        - getting-started/using-an-ai-agent.qmd
        - getting-started/minimal-git-diff-safety.qmd
