<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">RAM and storage</title>
  <desc id="desc">CPU works with variables in RAM. Files are stored on SSD or HDD and must be loaded or saved.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <rect x="24" y="120" width="150" height="82" rx="6" fill="#e8f2ff" stroke="#2f6fb2" stroke-width="2"/>
  <text x="99" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">CPU</text>
  <text x="99" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">executes code</text>

  <rect x="295" y="70" width="170" height="180" rx="6" fill="#eaf8ef" stroke="#2d8a4f" stroke-width="2"/>
  <text x="380" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">RAM</text>
  <text x="380" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">working memory</text>
  <rect x="320" y="152" width="120" height="28" rx="4" fill="#ffffff" stroke="#8bc39d"/>
  <text x="380" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">variables</text>
  <rect x="320" y="190" width="120" height="28" rx="4" fill="#ffffff" stroke="#8bc39d"/>
  <text x="380" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">arrays</text>

  <rect x="585" y="96" width="150" height="128" rx="6" fill="#fff3e2" stroke="#b87424" stroke-width="2"/>
  <text x="660" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">SSD / HDD</text>
  <text x="660" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">persistent storage</text>
  <rect x="612" y="178" width="96" height="28" rx="4" fill="#ffffff" stroke="#d29b58"/>
  <text x="660" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">files</text>

  <line x1="174" y1="160" x2="292" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="292" y1="182" x2="176" y2="182" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">read/write variables</text>

  <line x1="465" y1="142" x2="582" y2="142" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="582" y1="182" x2="468" y2="182" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="524" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">save</text>
  <text x="524" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">load</text>

  <text x="380" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">Variables disappear when the program ends unless results are saved as files.</text>
</svg>
