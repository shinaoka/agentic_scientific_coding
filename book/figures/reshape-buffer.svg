<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 390" role="img" aria-labelledby="title desc">
  <title id="title">Reshape as a different view of a data buffer</title>
  <desc id="desc">A one-dimensional data buffer can be viewed as different shapes without necessarily moving the data.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <text x="410" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Same data buffer, different shapes</text>
  <text x="410" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">data buffer</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="200" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="232" y="123" text-anchor="middle">1</text>
    <rect x="265" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="298" y="123" text-anchor="middle">2</text>
    <rect x="330" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="362" y="123" text-anchor="middle">3</text>
    <rect x="395" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="428" y="123" text-anchor="middle">4</text>
    <rect x="460" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="492" y="123" text-anchor="middle">5</text>
    <rect x="525" y="100" width="65" height="36" fill="#f8f8f8" stroke="#555"/><text x="558" y="123" text-anchor="middle">6</text>
  </g>
  <line x1="330" y1="145" x2="225" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="145" x2="610" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="205" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">shape (2, 3)</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="105" y="215" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="138" y="238" text-anchor="middle">1</text>
    <rect x="170" y="215" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="203" y="238" text-anchor="middle">3</text>
    <rect x="235" y="215" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="268" y="238" text-anchor="middle">5</text>
    <rect x="105" y="251" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="138" y="274" text-anchor="middle">2</text>
    <rect x="170" y="251" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="203" y="274" text-anchor="middle">4</text>
    <rect x="235" y="251" width="65" height="36" fill="#eaf8ef" stroke="#4c8f42"/><text x="268" y="274" text-anchor="middle">6</text>
  </g>

  <text x="610" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">shape (3, 2)</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="535" y="215" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="568" y="238" text-anchor="middle">1</text>
    <rect x="600" y="215" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="633" y="238" text-anchor="middle">4</text>
    <rect x="535" y="251" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="568" y="274" text-anchor="middle">2</text>
    <rect x="600" y="251" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="633" y="274" text-anchor="middle">5</text>
    <rect x="535" y="287" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="568" y="310" text-anchor="middle">3</text>
    <rect x="600" y="287" width="65" height="36" fill="#eef4ff" stroke="#456eb0"/><text x="633" y="310" text-anchor="middle">6</text>
  </g>
  <text x="410" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">reshape can change indexing without sorting or transposing the data.</text>
</svg>
