<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">AI-agent scientific coding loop</title>
  <desc id="desc">A workflow from brainstorm to plan to code generation to review. Forward arrows are solid; backtracking arrows are dotted.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="320" fill="#ffffff"/>

  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">AI-agent scientific coding loop</text>
  <g fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)">
    <path d="M 260 140 L 310 140"/>
    <path d="M 460 140 L 510 140"/>
    <path d="M 660 140 L 710 140"/>
  </g>

  <g fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)">
    <path d="M 318 92 C 286 70, 244 70, 212 92"/>
    <path d="M 518 92 C 486 70, 444 70, 412 92"/>
    <path d="M 718 92 C 686 70, 644 70, 612 92"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">
    <text x="265" y="73" text-anchor="middle">Feedback</text>
    <text x="465" y="73" text-anchor="middle">Feedback</text>
    <text x="665" y="73" text-anchor="middle">Feedback</text>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="110" y="102" width="150" height="76" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="185" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Brainstorm</text>

    <rect x="310" y="102" width="150" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="385" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Plan</text>

    <rect x="510" y="102" width="150" height="76" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="585" y="136" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Code</text>
    <text x="585" y="161" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">generation</text>

    <rect x="710" y="102" width="150" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="785" y="148" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Review</text>
  </g>
</svg>
