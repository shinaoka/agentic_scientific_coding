<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img" aria-labelledby="title desc">
  <title id="title">Stack, heap, and references</title>
  <desc id="desc">Local bindings can point to heap objects such as arrays. Two bindings may point to the same object.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <rect x="42" y="45" width="235" height="250" rx="6" fill="#eef4ff" stroke="#456eb0" stroke-width="2"/>
  <text x="160" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">Stack</text>
  <text x="160" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">local bindings / call frames</text>

  <rect x="78" y="130" width="160" height="42" rx="4" fill="#fff" stroke="#8da8d6"/>
  <text x="158" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">xs</text>
  <rect x="78" y="190" width="160" height="42" rx="4" fill="#fff" stroke="#8da8d6"/>
  <text x="158" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">ys</text>

  <rect x="455" y="45" width="265" height="250" rx="6" fill="#f1faef" stroke="#4c8f42" stroke-width="2"/>
  <text x="588" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">Heap</text>
  <text x="588" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">dynamic objects</text>

  <rect x="505" y="150" width="175" height="70" rx="4" fill="#fff" stroke="#8fc37f"/>
  <text x="592" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">Array object</text>
  <text x="592" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">[1, 2, 3]</text>

  <line x1="238" y1="151" x2="502" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="238" y1="211" x2="502" y2="198" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">points to</text>
  <text x="360" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">points to same object</text>

  <text x="380" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">If xs and ys refer to the same mutable object, changing one can affect the other.</text>
</svg>
